services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ky-postgres
    environment:
      POSTGRES_DB: ky
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ky"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
